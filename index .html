<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BookNest — a premium book library to organize, borrow, and track your reading collection." />
  <title>BookNest — Book Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <div id="toastWrap" class="toast-wrap" aria-live="polite"></div>

  <header class="topbar glass">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">BookNest</span>
        <span class="brand-sub">Library Suite</span>
      </div>
    </div>

    <div class="topbar-actions">
      <button id="themeToggle" class="icon-btn" title="Toggle theme" aria-label="Toggle dark mode">
        <svg class="i-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="i-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button id="historyBtn" class="ghost-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
        <span>History</span>
      </button>
      <button id="addBtn" class="primary-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Add Book
      </button>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Your reading collection, <span class="grad">beautifully organized.</span></h1>
      <p>Track, borrow, and return books with a calm, modern workflow built for readers.</p>
    </section>

    <section class="stats" id="stats"></section>

    <section class="controls glass">
      <div class="search">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Search by title or author…" />
      </div>
      <div class="filters" id="filters"></div>
    </section>

    <section class="grid" id="bookGrid"></section>
    <div id="emptyState" class="empty hidden">
      <p>No books match your search.</p>
    </div>
  </main>

  <footer class="footer">
    <p>BookNest Library Suite · Crafted for readers · 2026</p>
  </footer>

  <div id="addModal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-head">
        <h3>Add a new book</h3>
        <button class="icon-btn" id="closeModal" aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="addForm" class="modal-body">
        <label>Title<input type="text" id="fTitle" required placeholder="e.g. Atomic Habits" /></label>
        <label>Author<input type="text" id="fAuthor" required placeholder="e.g. James Clear" /></label>
        <label>Category
          <select id="fCategory" required></select>
        </label>
        <label>Cover color
          <input type="color" id="fColor" value="#6366f1" />
        </label>
        <div class="modal-actions">
          <button type="button" class="ghost-btn" id="cancelAdd">Cancel</button>
          <button type="submit" class="primary-btn">Save Book</button>
        </div>
      </form>
    </div>
  </div>

  <div id="historyDrawer" class="drawer-overlay hidden">
    <aside class="drawer glass">
      <div class="modal-head">
        <h3>Borrow History</h3>
        <button class="icon-btn" id="closeHistory" aria-label="Close">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="historyList" class="history-list"></div>
    </aside>
  </div>

  <script src="script.js"></script>
</body>
</html>
